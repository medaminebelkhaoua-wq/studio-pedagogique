<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Studio Contenu Pedagogique</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f5f5f5;display:flex;justify-content:center;padding:1rem}
#app{width:100%;max-width:560px;display:flex;flex-direction:column;gap:14px}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;overflow:hidden}
.card-header{padding:12px 16px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;gap:10px;background:#fafafa}
.step-badge{width:24px;height:24px;border-radius:50%;background:#EEEDFE;color:#3C3489;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-header h3{font-size:14px;font-weight:600;color:#111}
.card-body{padding:16px;display:flex;flex-direction:column;gap:12px}
input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;color:#111;background:#fff;outline:none}
input:focus{border-color:#534AB7}
.btn{padding:9px 18px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#534AB7;color:#fff}
.btn-primary:hover{background:#3C3489}
.btn-secondary{background:#fff;color:#111;border:1px solid #ddd}
.btn-full{width:100%;justify-content:center}
.persona-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.persona-card{border:1px solid #e5e5e5;border-radius:10px;padding:12px;cursor:pointer;transition:all .15s}
.persona-card:hover{border-color:#534AB7}
.persona-card.selected{border:2px solid #534AB7;background:#EEEDFE}
.persona-emoji{font-size:26px;margin-bottom:6px}
.persona-name{font-size:13px;font-weight:600;color:#111;margin-bottom:2px}
.persona-role{font-size:11px;color:#666;margin-bottom:6px}
.persona-quote{font-size:11px;color:#534AB7;font-style:italic;line-height:1.4}
.step-row{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid #e5e5e5;border-radius:8px;font-size:13px}
.step-row.active{border-color:#534AB7;background:#EEEDFE}
.step-row.done{border-color:#3B6D11;background:#EAF3DE}
.step-icon{font-size:18px;flex-shrink:0}
.step-label{flex:1;font-weight:500;color:#111}
.step-status{font-size:11px;color:#666}
.status-box{padding:12px;border-radius:8px;font-size:13px;line-height:1.6;display:flex;align-items:flex-start;gap:10px}
.status-loading{background:#EEEDFE;color:#3C3489}
.status-success{background:#EAF3DE;color:#27500A}
.status-error{background:#FCEBEB;color:#791F1F}
.label{font-size:12px;color:#666;font-weight:500;margin-bottom:4px}
.niveau-row{display:flex;gap:8px;flex-wrap:wrap}
.niveau-btn{padding:6px 14px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:13px}
.niveau-btn.selected{background:#534AB7;color:#fff;border-color:#534AB7}
.hidden{display:none}
.error-msg{color:#791F1F;background:#FCEBEB;border-radius:8px;padding:10px;font-size:13px;margin-top:8px}
</style>
</head>
<body>
<div id="app">
  <div class="card">
    <div class="card-header"><div class="step-badge">1</div><h3>Sujet du contenu</h3></div>
    <div class="card-body">
      <div><div class="label">Concept a expliquer</div>
        <input type="text" id="sujetInput" placeholder="Ex: La Revolution francaise, les fractions...">
      </div>
      <div><div class="label">Niveau</div>
        <div class="niveau-row">
          <button class="niveau-btn selected" onclick="selectNiveau(this,'CM2')">CM2</button>
          <button class="niveau-btn" onclick="selectNiveau(this,'CM1')">CM1</button>
          <button class="niveau-btn" onclick="selectNiveau(this,'CE2')">CE2</button>
          <button class="niveau-btn" onclick="selectNiveau(this,'College')">College</button>
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="analyserSujet()">Trouver les personnages</button>
      <div id="erreur1" class="error-msg hidden"></div>
    </div>
  </div>

  <div class="card hidden" id="personasSection">
    <div class="card-header"><div class="step-badge">2</div><h3>Choisir le personnage</h3></div>
    <div class="card-body">
      <div id="personaGrid" class="persona-grid"></div>
      <button class="btn btn-primary btn-full" onclick="lancerProduction()">Generer la video</button>
      <div id="erreur2" class="error-msg hidden"></div>
    </div>
  </div>

  <div class="card hidden" id="productionSection">
    <div class="card-header"><div class="step-badge">3</div><h3>Production en cours...</h3></div>
    <div class="card-body">
      <div id="step1" class="step-row active"><span class="step-icon">&#x270D;</span><span class="step-label">Generation du script</span><span class="step-status" id="s1status">En cours...</span></div>
      <div id="step2" class="step-row"><span class="step-icon">&#x1F3A8;</span><span class="step-label">Creation du portrait IA</span><span class="step-status" id="s2status">En attente</span></div>
      <div id="step3" class="step-row"><span class="step-icon">&#x1F3AC;</span><span class="step-label">Animation et voix D-ID</span><span class="step-status" id="s3status">En attente</span></div>
      <div id="step4" class="step-row"><span class="step-icon">&#x2705;</span><span class="step-label">Video prete</span><span class="step-status" id="s4status">En attente</span></div>
      <div id="statusMsg" class="status-box status-loading"><span>&#x23F3;</span><span id="statusText">Demarrage...</span></div>
    </div>
  </div>

  <div class="card hidden" id="resultSection">
    <div class="card-header"><div class="step-badge">&#x2713;</div><h3>Video prete !</h3></div>
    <div style="text-align:center;padding:20px">
      <video id="videoPlayer" controls style="width:100%;border-radius:10px;margin-bottom:12px"></video>
      <br>
      <a id="downloadBtn" class="btn btn-primary" download="video.mp4">Telecharger</a>
      <br><br>
      <button class="btn btn-secondary" onclick="reset()">Nouvelle video</button>
    </div>
  </div>
</div>

<script>
var API='https://studio-api.metatuteur.workers.dev';
var niveau='CM2', selectedPersona=null, personasData=[], sujet='';

function showErr(id,msg){
  var el=document.getElementById(id);
  el.textContent=msg;el.classList.remove('hidden');
  setTimeout(function(){el.classList.add('hidden')},6000);
}

function selectNiveau(b,v){
  document.querySelectorAll('.niveau-btn').forEach(function(x){x.classList.remove('selected')});
  b.classList.add('selected');niveau=v;
}

async function analyserSujet(){
  sujet=document.getElementById('sujetInput').value.trim();
  if(!sujet){showErr('erreur1','Entre un sujet !');return;}
  document.getElementById('personasSection').classList.remove('hidden');
  document.getElementById('personaGrid').innerHTML='<div style="grid-column:1/-1;padding:12px;color:#666;font-size:13px">Recherche des personnages...</div>';
  try{
    var r=await fetch(API+'/api/claude',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:'Pour le sujet "'+sujet+'" niveau '+niveau+', propose 4 personnages historiques ou scientifiques expressifs et charismatiques. Pour chaque personnage indique son genre. Reponds UNIQUEMENT en JSON valide sans markdown: {"personnages":[{"emoji":"...","nom":"...","titre":"...","accroche":"...","genre":"homme ou femme"}]}'})
    });
    if(!r.ok) throw new Error('Erreur serveur: '+r.status);
    var data=await r.json();
    var clean=data.text.trim().replace(/```json|```/g,'').trim();
    var parsed=JSON.parse(clean);
    personasData=parsed.personnages;
    renderPersonas();
  }catch(e){
    document.getElementById('personaGrid').innerHTML='';
    showErr('erreur1','Erreur: '+e.message);
    document.getElementById('personasSection').classList.add('hidden');
  }
}

function renderPersonas(){
  var grid=document.getElementById('personaGrid');
  grid.innerHTML='';
  personasData.forEach(function(p,i){
    var c=document.createElement('div');
    c.className='persona-card';
    c.innerHTML='<div class="persona-emoji">'+p.emoji+'</div><div class="persona-name">'+p.nom+'</div><div class="persona-role">'+p.titre+'</div><div class="persona-quote">"'+p.accroche+'"</div>';
    c.onclick=function(){
      document.querySelectorAll('.persona-card').forEach(function(x){x.classList.remove('selected')});
      c.classList.add('selected');selectedPersona=personasData[i];
    };
    grid.appendChild(c);
  });
}

function setStep(n,status){
  for(var i=1;i<=4;i++){
    document.getElementById('step'+i).className='step-row'+(i<n?' done':i===n?' active':'');
    document.getElementById('s'+i+'status').textContent=i<n?'Fait':i===n?status:'En attente';
  }
}

function setStatus(msg,type){
  document.getElementById('statusMsg').className='status-box status-'+(type||'loading');
  document.getElementById('statusText').textContent=msg;
}

async function lancerProduction(){
  if(!selectedPersona){showErr('erreur2','Choisis un personnage !');return;}
  document.getElementById('productionSection').classList.remove('hidden');
  document.getElementById('resultSection').classList.add('hidden');
  document.getElementById('productionSection').scrollIntoView({behavior:'smooth'});
  try{
    setStep(1,'En cours...'); setStatus('Generation du script...');
    var r1=await fetch(API+'/api/claude',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:'Tu es '+selectedPersona.nom+', '+selectedPersona.titre+'. Ecris un script video de 45 secondes TRES expressif et dynamique pour expliquer "'+sujet+'" a des parents d eleves de '+niveau+'. Parle a la premiere personne avec beaucoup de personnalite, commence par une accroche surprenante, explique avec une metaphore du quotidien moderne, sois drole et charismatique, termine par un appel a l action. Max 100 mots. Uniquement le texte du script.'})
    });
    var d1=await r1.json(); var script=d1.text;
    setStep(1,'Fait');

    setStep(2,'En cours...'); setStatus('Creation du portrait...');
    var r2=await fetch(API+'/api/image',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:'Hyper realistic charismatic expressive portrait of '+selectedPersona.nom+', warm smile, vibrant colors, cinematic lighting, confident look, detailed face, 8k, photorealistic, dramatic background, Renaissance painting style'})
    });
    var d2=await r2.json();
    if(d2.error) throw new Error('Image: '+d2.error);

    setStep(3,'En cours...'); setStatus('Animation et voix D-ID (1-2 minutes)...');
    var r3=await fetch(API+'/api/video',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({script:script, imageUrl:d2.url, persona:selectedPersona.nom, genre:selectedPersona.genre||'homme'})
    });
    var d3=await r3.json();
    if(d3.error) throw new Error('Video: '+d3.error);
    setStep(3,'Fait');

    setStep(4,'Prete !'); setStatus('Video generee avec succes !','success');
    document.getElementById('videoPlayer').src=d3.url;
    document.getElementById('downloadBtn').href=d3.url;
    document.getElementById('resultSection').classList.remove('hidden');
    document.getElementById('resultSection').scrollIntoView({behavior:'smooth'});

  }catch(e){
    setStatus('Erreur : '+e.message,'error');
  }
}

function reset(){
  document.getElementById('sujetInput').value='';
  ['personasSection','productionSection','resultSection'].forEach(function(id){
    document.getElementById(id).classList.add('hidden');
  });
  selectedPersona=null;window.scrollTo(0,0);
}
</script>
</body>
</html>
